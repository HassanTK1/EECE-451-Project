<!DOCTYPE html>
<html>
    <head>
        <title>Network Cell Analyzer</title>
        <style>
            body {
                background-color: #1A1A1A;
                color: white;
                font-family: Arial;
                text-align: center;
                padding: 20px;
            }
            table {
                margin: auto;
                border-collapse: collapse;
                width: 60%;
            }
            th, td {
                border: 1px solid white;
                padding: 10px;
                text-align: center;
            }
            th {
                background-color: #333;
            }
        </style>
    </head>
    <body>
        <h1>Server Dashboard</h1>

        <div style="
            display: inline-block;
            background-color: #2A2A2A;
            padding: 20px 40px;
            margin-bottom: 20px;
            border-radius: 8px;">
            <p style="color: #888888; margin: 0;">Connected Devices</p>
            <h2 id="connectedCount" style="margin: 5px 0 0 0; color: #4CAF50;">0</h2>
        </div>

        <table id="devicesTable">
            <tr>
                <th>Device ID</th>
                <th>MAC Address</th>
                <th>First Seen</th>
                <th>Last Seen</th>
                <th>Status</th>
            </tr>
        </table>

        <script>
            function loadDevices() {
                fetch('/devices')
                .then(r => r.json())
                .then(devices => {
                    var table = document.getElementById('devicesTable')
                    table.innerHTML = '<tr><th>Device ID</th><th>MAC Address</th><th>First Seen</th><th>Last Seen</th><th>Status</th></tr>'
                    
                    var connected = devices.filter(d => d.status === "Connected").length
                    document.getElementById('connectedCount').textContent = connected

                    devices.forEach(function(device) {
                        var statusColor = device.status === "Connected" ? "#4CAF50" : "#888888"
                        table.innerHTML += '<tr>' +
                            '<td>' + device.device_id + '</td>' +
                            '<td>' + device.mac_address + '</td>' +
                            '<td>' + device.first_seen + '</td>' +
                            '<td>' + device.last_seen + '</td>' +
                            '<td style="color:' + statusColor + '">' + device.status + '</td>' +
                            '</tr>'
                    })
                })
            }
            loadDevices()
            setInterval(loadDevices, 5000)
        </script>
    </body>
</html>
